name: Java CI com Maven

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # O comando '-DskipTests=false' garante que os testes rodem
      # O comando 'checkstyle:check' garante o Linting
      - name: Rodar Lint e Testes
        run: mvn clean verify